<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fraction Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  font-family: system-ui, -apple-system, sans-serif;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  background: #0d0d1a;
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 11px 3px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  color: #b0b0cc;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.tab.active { color: #f5a623; border-bottom-color: #f5a623; }

.panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.panel.active { display: flex; }

/* ══════════════════════════════════
   SHARED CALCULATOR LAYOUT
══════════════════════════════════ */

.calc-display {
  padding: 10px 14px 8px;
  flex-shrink: 0;
  min-height: 85px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-end;
  position: relative;
}
.disp-top {
  font-size: 0.82rem;
  font-weight: 600;
  min-height: 18px;
  text-align: right;
  opacity: 0.85;
}
.disp-main {
  font-size: 2.6rem;
  font-weight: 700;
  line-height: 1.05;
  text-align: right;
  word-break: break-all;
}

/* Fraction tab display: teal */
#tab-frac .calc-display {
  background: linear-gradient(160deg, #6ab4cc 0%, #4a93ac 100%);
  color: #000;
}

/* Construction tab display: dark amber */
#tab-const .calc-display {
  background: linear-gradient(160deg, #2a2010 0%, #1e1a0d 100%);
  color: #f5c060;
  border-bottom: 1px solid #3a3020;
  min-height: 100px;
  flex-direction: row;
  align-items: flex-end;
  gap: 10px;
}
#tab-const .disp-main { color: #f5c060; }
#tab-const .disp-top  { color: #d4a060; }
#tab-const .disp-sub  { color: #d4a060; font-size: 1.1rem; font-weight: 600; text-align: right; min-height: 0; }
.disp-stack { flex: 1; display: flex; flex-direction: column; align-items: flex-end; }
.disp-c-btn {
  background: #4a1a10;
  color: #f87878;
  border: none;
  border-radius: 7px;
  font-size: 1.1rem;
  font-weight: 800;
  padding: 8px 13px;
  cursor: pointer;
  flex-shrink: 0;
  align-self: center;
}

/* Keypad wrapper */
.calc-keypad {
  display: flex;
  flex-direction: column;
  flex: 1;
  padding: 6px;
  gap: 5px;
  min-height: 0;
}

.key-area {
  display: flex;
  gap: 0;
  flex: 1;
  min-height: 0;
}

.left-pad {
  display: flex;
  flex-direction: column;
  flex: 2;
  gap: 4px;
  padding-right: 8px;
}

.pad-sep {
  width: 2px;
  background: #3a3d55;
  border-radius: 1px;
  flex-shrink: 0;
  margin: 4px 0;
}

.right-pad {
  display: flex;
  flex-direction: column;
  flex: 3;
  gap: 4px;
  padding-left: 8px;
}

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; flex: 1; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; flex: 1; }

.frac-bar-key {
  height: 4px;
  background: #4a4d6a;
  border-radius: 2px;
  flex-shrink: 0;
  margin: 3px 0;
}

.op-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  flex-shrink: 0;
  height: 48px;
}

/* ── Keys ── */
.key {
  background: #2c3050;
  border: none;
  border-radius: 7px;
  color: #f0f2ff;
  font-size: 1.15rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.08s;
  line-height: 1;
}
.key:active { background: #3d4268; }

.key-c  { background: #b03a33; color: #fff; font-weight: 800; }
.key-c:active { background: #8f2e28; }
.key-pm { background: #353858; color: #c0c8e8; font-size: 0.95rem; }
.key-del { color: #a0b0d8; }
.key-dot { color: #c0c8e8; }

.key-op { background: #22253a; color: #b0c0d8; font-size: 1.25rem; }
.key-op:active { background: #2e3250; }
.key-op.active-op { background: #f5a623; color: #000; }

.key-eq { background: #f5a623; color: #000; font-size: 1.4rem; font-weight: 800; }
.key-eq:active { background: #d48f1a; }

.span2 { grid-column: span 2; }

/* Construction tab keys */
#tab-const .key     { background: #1e2230; color: #ede5c0; }
#tab-const .key:active { background: #2a2e40; }
#tab-const .key-c   { background: #4a1a10; color: #f87878; }
#tab-const .key-pm  { background: #252030; color: #d0b880; }
#tab-const .key-del { color: #c09060; }
#tab-const .key-op  { background: #181810; color: #c09060; }
#tab-const .key-op.active-op { background: #f5a623; color: #000; }
#tab-const .key-eq  { background: #f5a623; }
#tab-const .pad-sep { background: #3a3020; }
#tab-const .frac-bar-key { background: #3a3020; }

/* Mode toggle (IN / FT) */
.mode-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  flex-shrink: 0;
}
.mode-btn {
  padding: 5px 0;
  background: #1a1c28;
  border: 1px solid #3a3020;
  border-radius: 6px;
  color: #c09060;
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.1s;
}
.mode-btn.active-mode { background: #f5a623; border-color: #f5a623; color: #000; }

/* FT mode: mini dual-field display inside left pad */
.ft-fields-row {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.mini-dp {
  flex: 1;
  background: #1e2230;
  border: 2px solid transparent;
  border-radius: 6px;
  color: #ede5c0;
  font-size: 1.05rem;
  font-weight: 800;
  text-align: center;
  padding: 4px 2px;
  cursor: pointer;
  transition: all 0.1s;
}
.mini-dp.active-field { background: #f5a623; color: #000; border-color: #f5a623; }
.mini-unit { font-size: 2.4rem; color: #c09060; font-weight: 700; flex-shrink: 0; line-height: 1; }
.mini-c {
  background: #4a1a10; color: #f87878;
  border: none; border-radius: 6px;
  font-size: 0.75rem; font-weight: 800;
  padding: 4px 7px; cursor: pointer; flex-shrink: 0;
}

/* Section labels */
.pad-label {
  font-size: 0.6rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  padding-bottom: 2px;
  flex-shrink: 0;
}
#tab-frac .pad-label { color: #9090c0; }
#tab-const .pad-label { color: #b08848; }

.right-label-row {
  display: flex;
  flex-shrink: 0;
}
.right-label-row .pad-label {
  flex: 1;
  border-bottom: 1px solid transparent;
}

/* ── Sq Ft Tab ── */
#tab-sqft .calc-display {
  background: linear-gradient(160deg, #0e1f0e 0%, #0a170a 100%);
  color: #6dd86d;
  border-bottom: 1px solid #1e3a1e;
  min-height: 100px;
  flex-direction: row;
  align-items: flex-end;
  gap: 10px;
}
#tab-sqft .disp-main { color: #6dd86d; font-size: 2.2rem; }
#tab-sqft .disp-top  { color: #4a9a4a; }
#tab-sqft .disp-sub  { color: #80d860; font-size: 1.3rem; font-weight: 700; text-align: right; }
#tab-sqft .disp-c-btn { background: #1a3a10; color: #6dd86d; }

.sqft-inputs {
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 8px 8px 4px;
  gap: 6px;
  flex-shrink: 0;
}
.sqft-dim { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
.sqft-dim-label { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #4a9a4a; }
.sqft-fields { display: flex; align-items: center; gap: 3px; }
.sq-dp {
  background: #1a2a1a; border: 2px solid transparent; border-radius: 6px;
  color: #c0e8c0; font-size: 1.3rem; font-weight: 800;
  text-align: center; padding: 5px 6px; min-width: 38px;
  cursor: pointer; transition: all 0.1s;
}
.sq-dp.active-sq { background: #f5a623; color: #000; border-color: #f5a623; }
.sqft-unit { font-size: 2.4rem; color: #4a9a4a; font-weight: 700; line-height: 1; }
.sqft-x { font-size: 1.8rem; color: #4a9a4a; font-weight: 700; flex-shrink: 0; padding-top: 18px; }

.sq-rate-row {
  display: flex; align-items: center; gap: 8px;
  padding: 2px 10px 4px; flex-shrink: 0;
}
.sq-dollar { font-size: 1.6rem; font-weight: 800; color: #4a9a4a; flex-shrink: 0; }
.sq-rate-dp { flex: 1; min-width: 0; font-size: 1.4rem; }
.sq-rate-unit { font-size: 0.85rem; font-weight: 800; color: #4a9a4a; flex-shrink: 0; }
.sq-rate-hint { font-size: 0.65rem; color: #3a7a3a; font-style: italic; flex-shrink: 0; }

.sq-numpad {
  display: flex; flex-direction: column; flex: 1;
  gap: 4px; min-height: 0; padding: 0 6px 6px;
}
.sq-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; flex: 1; }
.sq-row4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; flex: 1; }
#tab-sqft .key     { background: #162416; color: #c0e8c0; }
#tab-sqft .key:active { background: #1e341e; }
#tab-sqft .key-del { color: #4a9a4a; }
#tab-sqft .key-dot { color: #80c880; }
#tab-sqft .sq-adv  { color: #f5a623; font-weight: 800; font-size: 1.3rem; }

/* ── Layout Tab ── */
#tab-layout .calc-display {
  background: linear-gradient(160deg, #16102a 0%, #100c20 100%);
  color: #c0a0ff;
  border-bottom: 1px solid #2a1f4a;
  min-height: 100px;
  flex-direction: row;
  align-items: flex-end;
  gap: 10px;
}
#tab-layout .disp-main { color: #c0a0ff; font-size: 2.2rem; }
#tab-layout .disp-top  { color: #7050b0; }
#tab-layout .disp-sub  { color: #a080e8; font-size: 1.1rem; font-weight: 700; text-align: right; }
#tab-layout .disp-c-btn { background: #2a1060; color: #c0a0ff; }
#tab-layout .mode-btn  { border-color: #2a1f4a; color: #7050b0; background: #12082a; }
#tab-layout .mode-btn.active-mode { background: #7b4dff; border-color: #7b4dff; color: #fff; }
#tab-layout .key { background: #16102a; color: #d0b8ff; }
#tab-layout .key:active { background: #241440; }
#tab-layout .key-del { color: #7050b0; }

.lay-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  padding: 5px 8px 3px;
  flex-shrink: 0;
}
.lay-inputs {
  padding: 4px 10px 5px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.lay-row {
  display: flex;
  align-items: center;
  gap: 5px;
}
.lay-label {
  font-size: 0.58rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  color: #6040a0;
  width: 40px;
  flex-shrink: 0;
}
.lay-dp {
  background: #16102a;
  border: 2px solid transparent;
  border-radius: 6px;
  color: #d0b8ff;
  font-size: 1.25rem;
  font-weight: 800;
  text-align: center;
  padding: 4px 6px;
  min-width: 36px;
  cursor: pointer;
  transition: all 0.1s;
}
.lay-dp.active-lay { background: #f5a623; color: #000; border-color: #f5a623; }
.lay-dp-wide { min-width: 60px; }
.lay-dp-sm { min-width: 28px; font-size: 1.05rem; padding: 4px 3px; }
.lay-unit { font-size: 2rem; color: #5030a0; font-weight: 700; line-height: 1; }
.lay-unit-sm { font-size: 0.9rem; font-weight: 700; color: #5030a0; }
.lay-fracbar { color: #7050b0; font-size: 1.3rem; font-weight: 700; }
.lay-numpad {
  display: flex;
  flex-direction: column;
  flex: 1;
  gap: 4px;
  min-height: 0;
  padding: 0 6px 6px;
}
.lay-adv { color: #f5a623; font-weight: 800; font-size: 1.3rem; }

/* ── Save button (in display) ── */
.disp-save-btn {
  background: rgba(255,255,255,0.13);
  border: none;
  border-radius: 5px;
  color: rgba(255,255,255,0.85);
  font-size: 0.64rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  padding: 4px 8px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.disp-save-btn.saved { background: #2a6a2a; color: #80e880; }
/* Fraction tab: no C button, so float save to top-left */
#tab-frac .disp-save-btn { position: absolute; top: 8px; left: 10px; }
.disp-btn-col {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex-shrink: 0;
  align-self: center;
}

/* ── Saves tab button ── */
.saves-tab-btn {
  flex-shrink: 0;
  width: 52px;
  padding: 11px 4px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  color: #5a5d80;
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
}
.saves-tab-btn.has-saves { color: #f5a623; border-bottom-color: #f5a623; }
.saves-badge {
  position: absolute;
  top: 5px;
  right: 4px;
  background: #f5a623;
  color: #000;
  font-size: 0.52rem;
  font-weight: 900;
  border-radius: 7px;
  padding: 1px 3px;
  line-height: 1.4;
  display: none;
}

/* ── Saves overlay ── */
.saves-overlay {
  position: fixed;
  inset: 0;
  background: #0d0d1a;
  z-index: 100;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
}
.saves-overlay.hidden { display: none; }
.saves-header {
  display: flex;
  align-items: center;
  padding: 13px 14px;
  border-bottom: 1px solid #2a2d45;
  flex-shrink: 0;
  gap: 8px;
}
.saves-title { flex: 1; color: #f0f2ff; font-size: 0.95rem; font-weight: 800; letter-spacing: 0.05em; }
.saves-clear-btn {
  background: #3a2020; border: none; border-radius: 6px;
  color: #f87878; font-size: 0.7rem; font-weight: 800;
  padding: 6px 10px; cursor: pointer; display: none;
}
.saves-close-btn {
  background: #2c3050; border: none; border-radius: 6px;
  color: #b0b0cc; font-size: 0.85rem; font-weight: 800;
  padding: 6px 13px; cursor: pointer;
}
.saves-list {
  flex: 1; overflow-y: auto; padding: 10px;
  display: flex; flex-direction: column; gap: 8px;
}
.saves-empty {
  text-align: center; color: #4a4d6a;
  font-size: 0.9rem; font-weight: 600; margin-top: 70px;
}
.save-card {
  background: #1a1e38; border-radius: 10px;
  padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px;
}
.save-badge {
  background: #2c3050; border-radius: 5px; color: #8090b8;
  font-size: 0.58rem; font-weight: 800; letter-spacing: 0.1em;
  padding: 3px 6px; flex-shrink: 0; margin-top: 3px;
}
.save-body { flex: 1; min-width: 0; }
.save-label { color: #6070a0; font-size: 0.74rem; font-weight: 600; margin-bottom: 2px; }
.save-result { color: #f0f2ff; font-size: 1.2rem; font-weight: 800; }
.save-sub { color: #8090b0; font-size: 0.8rem; font-weight: 600; margin-top: 2px; }
.save-del-btn {
  background: none; border: none; color: #3a3d5a;
  font-size: 1rem; cursor: pointer; padding: 2px 4px;
  transition: color 0.1s; display: block;
}
.save-del-btn:active { color: #f87878; }
.save-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; align-self: flex-start; }
.save-assign-btn {
  background: none; border: none; color: #3a3d5a;
  font-size: 1rem; cursor: pointer; padding: 2px 4px; display: block;
  transition: color 0.1s;
}
.save-assign-btn:active { color: #8090d8; }
.save-proj-tag {
  font-size: 0.67rem; color: #6070a0; font-weight: 700;
  letter-spacing: 0.04em; margin-top: 3px;
}
/* ── Project pills ── */
.projects-row {
  display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0;
  padding: 8px 10px; border-bottom: 1px solid #1a1d30;
  scrollbar-width: none;
}
.projects-row::-webkit-scrollbar { display: none; }
.proj-pill {
  background: #1a1e38; border: 1px solid #2a2d4a; border-radius: 20px;
  color: #8090b8; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.05em;
  padding: 5px 13px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all 0.15s;
}
.proj-pill.active { background: #f5a623; border-color: #f5a623; color: #000; }
.proj-pill-new {
  background: none; border: 1px dashed #2a2d4a; border-radius: 20px;
  color: #4a4d6a; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.05em;
  padding: 5px 13px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
/* ── Project picker dropdown ── */
.proj-picker {
  position: fixed; background: #1e2240; border: 1px solid #2e3260;
  border-radius: 10px; padding: 5px; z-index: 200; min-width: 160px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.proj-picker.hidden { display: none; }
.proj-picker-item {
  padding: 9px 12px; color: #c0c8f0; font-size: 0.82rem; font-weight: 600;
  border-radius: 6px; cursor: pointer; white-space: nowrap;
}
.proj-picker-item:active { background: #2e3260; }
.proj-picker-item.current { color: #f5a623; }
.proj-picker-item.new-proj { color: #6070a0; border-top: 1px solid #2a2d4a; margin-top: 3px; padding-top: 10px; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showTab('frac',this)">Fraction</button>
  <button class="tab" onclick="showTab('const',this)">Construction</button>
  <button class="tab" onclick="showTab('sqft',this)">Sq Ft</button>
  <button class="tab" onclick="showTab('layout',this)">Layout</button>
  <button class="saves-tab-btn" id="saves-tab-btn" onclick="openSaves()">
    SAVES<span class="saves-badge" id="saves-badge"></span>
  </button>
</div>

<!-- ════════════════════════════════
     FRACTION TAB
════════════════════════════════ -->
<div id="tab-frac" class="panel active">

  <div class="calc-display">
    <button class="disp-save-btn" onclick="saveCurrentResult()">SAVE</button>
    <div class="disp-top"  id="f-top"></div>
    <div class="disp-main" id="f-main">0</div>
  </div>

  <div class="calc-keypad">
    <div class="key-area">

      <!-- Left: whole number -->
      <div class="left-pad">
        <div class="pad-label">Whole</div>
        <div class="row2">
          <button class="key key-c"  onclick="fClear()">C</button>
          <button class="key key-pm" onclick="fSign()">+/−</button>
        </div>
        <div class="row2">
          <button class="key" onclick="fW('1')">1</button>
          <button class="key" onclick="fW('2')">2</button>
        </div>
        <div class="row2">
          <button class="key" onclick="fW('3')">3</button>
          <button class="key" onclick="fW('4')">4</button>
        </div>
        <div class="row2">
          <button class="key" onclick="fW('5')">5</button>
          <button class="key" onclick="fW('6')">6</button>
        </div>
        <div class="row2">
          <button class="key" onclick="fW('7')">7</button>
          <button class="key" onclick="fW('8')">8</button>
        </div>
        <div class="row2">
          <button class="key" onclick="fW('9')">9</button>
          <button class="key" onclick="fW('0')">0</button>
        </div>
        <div class="row2">
          <button class="key key-dot" onclick="fW('.')">.</button>
          <button class="key key-del" onclick="fWdel()">⌫</button>
        </div>
      </div>

      <div class="pad-sep"></div>

      <!-- Right: numerator / line / denominator -->
      <div class="right-pad">

<script>
// ─── Shared utilities ─────────────────────────────────────────────────────────
function showTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function gcd(a, b) {
  a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b));
  while (b) { [a, b] = [b, a % b]; }
  return a || 1;
}

function fmtMixed(v) {
  if (!isFinite(v)) return 'Error';
  const neg = v < 0;
  const abs = Math.abs(v);
  const whole = Math.floor(abs + 1e-9);
  const frac  = abs - whole;

  let bestN = 0, bestD = 1, bestErr = Infinity;
  for (const d of [1, 2, 4, 8, 16, 32, 64]) {
    const n = Math.round(frac * d);
    const err = Math.abs(n / d - frac);
    if (err < bestErr - 1e-12) { bestErr = err; bestN = n; bestD = d; }
  }
  let w = whole;
  if (bestN >= bestD) { w++; bestN = 0; bestD = 1; }

  const g  = gcd(bestN, bestD);
  const fn = bestN / g, fd = bestD / g;
  const s  = neg ? '−' : '';

  if (w > 0 && fn > 0)  return `${s}${w} ${fn}/${fd}`;
  if (w > 0)             return `${s}${w}`;
  if (fn > 0)            return `${s}${fn}/${fd}`;
  return '0';
}

function fmtInchesOnly(totalIn) {
  if (!isFinite(totalIn)) return '';
  const neg = totalIn < 0;
  const abs = Math.abs(totalIn);
  const inWhole = Math.floor(abs + 1e-9);
  const frac    = abs - inWhole;

  let bestN = 0, bestD = 1, bestErr = Infinity;
  for (const d of [1, 2, 4, 8, 16, 32, 64]) {
    const n = Math.round(frac * d);
    const err = Math.abs(n / d - frac);
    if (err < bestErr - 1e-12) { bestErr = err; bestN = n; bestD = d; }
  }
  if (bestN >= bestD) { bestN = 0; }
  const g = gcd(bestN, bestD);
  const fn = bestN / g, fd = bestD / g;

  let s = inWhole > 0 ? `${inWhole}` : '';
  if (fn > 0) s += (s ? '-' : '') + `${fn}/${fd}`;
  if (!s) s = '0';
  return (neg ? '−' : '') + s + '"';
}

function fmtInches(totalIn) {
  if (!isFinite(totalIn)) return 'Error';
  const neg = totalIn < 0;
  const abs = Math.abs(totalIn);
  const ft  = Math.floor(abs / 12);
  const remIn   = abs - ft * 12;
  const inWhole = Math.floor(remIn + 1e-9);
  const frac    = remIn - inWhole;

  let bestN = 0, bestD = 1, bestErr = Infinity;
  for (const d of [1, 2, 4, 8, 16, 32, 64]) {
    const n = Math.round(frac * d);
    const err = Math.abs(n / d - frac);
    if (err < bestErr - 1e-12) { bestErr = err; bestN = n; bestD = d; }
  }
  if (bestN >= bestD) { bestN = 0; }

  const g  = gcd(bestN, bestD);
  const fn = bestN / g, fd = bestD / g;

  let inStr = inWhole > 0 ? `${inWhole}` : '';
  if (fn > 0) inStr += (inStr ? '-' : '') + `${fn}/${fd}`;
  if (!inStr) inStr = '0';

  const sign = neg ? '−' : '';
  if (ft > 0) return `${sign}${ft}' ${inStr}"`;
  return `${sign}${inStr}"`;
}

// ─── FRACTION TAB ─────────────────────────────────────────────────────────────
const FT = { phase: 'A', whole:'', num:'', den:'', storedVal:0, storedStr:'0', op:'' };

function fVal()      { const w=parseFloat(FT.whole||'0'), n=parseInt(FT.num||'0'), d=parseInt(FT.den||'0'); return w+(d>0?n/d:0); }
function fInputStr() {
  const w=FT.whole||'0', n=FT.num, d=FT.den;
  if(!n&&!d) return w;
  if(n&&!d)  return `${w} ${n}/`;
  if(!n&&d)  return `${w} 0/${d}`;
  return `${w} ${n}/${d}`;
}
function fRender() {
  const top=document.getElementById('f-top'), main=document.getElementById('f-main');
  if(FT.phase==='A') { top.textContent=''; main.textContent=fInputStr(); }
  else if(FT.phase==='OP') { top.textContent=FT.storedStr+' '+FT.op; main.textContent='0'; }
  else if(FT.phase==='B')  { top.textContent=FT.storedStr+' '+FT.op; main.textContent=fInputStr(); }
}
function fResetInput() { FT.whole=''; FT.num=''; FT.den=''; }

function fW(d) {
  if(FT.phase==='R'){FT.phase='A';fResetInput();}
  if(FT.phase==='OP'){FT.phase='B';fResetInput();}
  if(d==='.'&&FT.whole.includes('.')) return;
  if(FT.whole.length>=8) return;
  FT.whole+=d; fRender();
}
function fN(d) {
  if(FT.phase==='R'){FT.phase='A';fResetInput();}
  if(FT.phase==='OP'){FT.phase='B';fResetInput();}
  if(FT.num.length>=6) return;
  FT.num+=d; fRender();
}
function fD(d) {
  if(FT.phase==='R'){FT.phase='A';fResetInput();}
  if(FT.phase==='OP'){FT.phase='B';fResetInput();}
  if(FT.den.length>=6) return;
  FT.den+=d; fRender();
}
function fWdel() { FT.whole=FT.whole.slice(0,-1); fRender(); }
function fNdel() { FT.num=FT.num.slice(0,-1);     fRender(); }
function fDdel() { FT.den=FT.den.slice(0,-1);     fRender(); }

function fOp(btn) {
  document.querySelectorAll('#tab-frac .key-op').forEach(b=>b.classList.remove('active-op'));
  btn.classList.add('active-op');
  if(FT.phase==='B') fEq(true);
  FT.storedVal=fVal(); FT.storedStr=fInputStr(); FT.op=btn.dataset.op;
  FT.phase='OP'; fResetInput(); fRender();
}

function fEq(chain=false) {
  if(FT.phase==='OP') return;
  if(FT.phase==='A') {
    if(!FT.num && !FT.den) return;
    const v = fVal();
    const resStr = fmtMixed(v);
    document.getElementById('f-top').textContent  = fInputStr() + ' =';
    document.getElementById('f-main').textContent = resStr;
    FT.phase='R'; FT.storedVal=v; FT.storedStr=resStr; fResetInput();
    return;
  }
  const b=fVal(), bStr=fInputStr();
  let res;
  try {
    if(FT.op==='+') res=FT.storedVal+b;
    else if(FT.op==='−') res=FT.storedVal-b;
    else if(FT.op==='×') res=FT.storedVal*b;
    else if(FT.op==='÷') { if(b===0) throw new Error('÷ 0'); res=FT.storedVal/b; }
  } catch(e) {
    document.getElementById('f-top').textContent='';
    document.getElementById('f-main').textContent=e.message;
    FT.phase='A'; fResetInput(); return;
  }
  const resStr=fmtMixed(res);
  if(!chain) {
    document.getElementById('f-top').textContent=`${FT.storedStr} ${FT.op} ${bStr} =`;
    document.getElementById('f-main').textContent=resStr;
    FT.phase='R';
  }
  FT.storedVal=res; FT.storedStr=resStr; fResetInput();
}

function fClear() {
  FT.phase='A'; FT.op=''; FT.storedVal=0; FT.storedStr='0'; fResetInput();
  document.getElementById('f-top').textContent='';
  document.getElementById('f-main').textContent='0';
  document.querySelectorAll('#tab-frac .key-op').forEach(b=>b.classList.remove('active-op'));
}

function fSign() {
  if(FT.whole.startsWith('-')) FT.whole=FT.whole.slice(1);
  else FT.whole=FT.whole?'-'+FT.whole:'-0';
  fRender();
}

// ─── CONSTRUCTION TAB ─────────────────────────────────────────────────────────
const CT = {
  phase: 'A',
  mode: 'in',
  ftField: 'ft',
  whole: '', num: '', den: '',
  feet: '', ftIn: '',
  storedVal: 0, storedStr: '0"', op: '',
};

function setMode(m) {
  CT.mode = m;
  cResetInput();
  CT.phase = 'A';
  document.getElementById('mode-in').classList.toggle('active-mode', m==='in');
  document.getElementById('mode-ft').classList.toggle('active-mode', m==='ft');
  document.getElementById('in-ctrl').style.display    = m==='in' ? 'grid' : 'none';
  document.getElementById('ft-ctrl').style.display    = m==='ft' ? 'flex' : 'none';
  document.getElementById('c-dot-btn').parentElement.style.display = m==='ft' ? 'none' : 'grid';
  document.getElementById('ft-sep-row').style.display = m==='ft' ? 'grid' : 'none';
  document.getElementById('c-pad-label').textContent = m==='in' ? 'Inches' : 'Feet + Inches';
  CT.storedVal = 0;
  CT.storedStr = m==='ft' ? "0' 0\"" : '0"';
  document.querySelectorAll('#tab-const .key-op').forEach(b=>b.classList.remove('active-op'));
  cRender();
}

function setFtField(f) {
  CT.ftField = f;
  document.getElementById('dp-ft').classList.toggle('active-field',   f==='ft');
  document.getElementById('dp-ftin').classList.toggle('active-field', f==='in');
}

function cVal() {
  const n = parseInt(CT.num||'0'), d = parseInt(CT.den||'0');
  const frac = d > 0 ? n/d : 0;
  if (CT.mode==='ft') {
    return (parseInt(CT.feet||'0') * 12) + (parseInt(CT.ftIn||'0')) + frac;
  }
  return parseFloat(CT.whole||'0') + frac;
}

function cInputStr() {
  const n=CT.num, d=CT.den;
  const fracStr = (!n&&!d) ? '' : (n&&!d) ? `-${n}/` : (!n&&d) ? `-0/${d}` : `-${n}/${d}`;
  if (CT.mode==='ft') {
    const ft=CT.feet||'0', fi=CT.ftIn||'0';
    return `${ft}' ${fi}${fracStr}"`;
  }
  const w=CT.whole||'0';
  return `${w}${fracStr}"`;
}

function cRender() {
  const top=document.getElementById('c-top'), main=document.getElementById('c-main'), sub=document.getElementById('c-sub');
  if (CT.mode==='ft') {
    document.getElementById('dp-ft').textContent   = CT.feet||'0';
    document.getElementById('dp-ftin').textContent = CT.ftIn||'0';
  }
  const emptyDisplay = CT.mode==='ft' ? "0' 0\"" : '0"';
  if (CT.phase==='A' || CT.phase==='B') {
    top.textContent  = CT.phase==='B' ? CT.storedStr+' '+CT.op : '';
    main.textContent = cInputStr();
    const v = cVal();
    if (v > 0) {
      sub.textContent = CT.mode==='in' ? fmtInches(v) : fmtInchesOnly(v);
    } else {
      sub.textContent = '';
    }
  } else if (CT.phase==='OP') {
    top.textContent  = CT.storedStr+' '+CT.op;
    main.textContent = emptyDisplay;
    sub.textContent  = '';
  }
}

function cResetInput() {
  CT.whole=''; CT.num=''; CT.den=''; CT.feet=''; CT.ftIn=''; CT.ftField='ft';
  const dpFt   = document.getElementById('dp-ft');
  const dpFtIn = document.getElementById('dp-ftin');
  if (dpFt)   { dpFt.classList.add('active-field');    dpFt.textContent='0'; }
  if (dpFtIn) { dpFtIn.classList.remove('active-field'); dpFtIn.textContent='0'; }
}

function cW(d) {
  if(CT.phase==='R'){CT.phase='A';cResetInput();}
  if(CT.phase==='OP'){CT.phase='B';cResetInput();}
  if (CT.mode==='ft') {
    if (d==='.') return;
    if (CT.ftField==='ft') { if(CT.feet.length>=4) return; CT.feet+=d; }
    else                   { if(CT.ftIn.length>=2) return; CT.ftIn+=d; }
  } else {
    if(d==='.'&&CT.whole.includes('.')) return;
    if(CT.whole.length>=6) return;
    CT.whole+=d;
  }
  cRender();
}
function cN(d) {
  if(CT.phase==='R'){CT.phase='A';cResetInput();}
  if(CT.phase==='OP'){CT.phase='B';cResetInput();}
  if(CT.num.length>=4) return;
  CT.num+=d; cRender();
}
function cD(d) {
  if(CT.phase==='R'){CT.phase='A';cResetInput();}
  if(CT.phase==='OP'){CT.phase='B';cResetInput();}
  if(CT.den.length>=4) return;
  CT.den+=d; cRender();
}
function cWdel() {
  if (CT.mode==='ft') {
    if(CT.ftField==='ft') CT.feet=CT.feet.slice(0,-1);
    else CT.ftIn=CT.ftIn.slice(0,-1);
  } else {
    CT.whole=CT.whole.slice(0,-1);
  }
  cRender();
}
function cNdel() { CT.num=CT.num.slice(0,-1); cRender(); }
function cDdel() { CT.den=CT.den.slice(0,-1); cRender(); }

function cOp(btn) {
  document.querySelectorAll('#tab-const .key-op').forEach(b=>b.classList.remove('active-op'));
  btn.classList.add('active-op');
  if(CT.phase==='B') cEq(true);
  CT.storedVal=cVal(); CT.storedStr=cInputStr(); CT.op=btn.dataset.op;
  CT.phase='OP'; cResetInput(); cRender();
}

function cEq(chain=false) {
  if(CT.phase==='A'||CT.phase==='OP') return;
  const b=cVal(), bStr=cInputStr();
  let res;
  try {
    if(CT.op==='+') res=CT.storedVal+b;
    else if(CT.op==='−') res=CT.storedVal-b;
    else if(CT.op==='×') res=CT.storedVal*b;
    else if(CT.op==='÷') { if(b===0) throw new Error('÷ 0'); res=CT.storedVal/b; }
  } catch(e) {
    document.getElementById('c-top').textContent='';
    document.getElementById('c-main').textContent=e.message;
    document.getElementById('c-sub').textContent='';
    CT.phase='A'; cResetInput(); return;
  }
  const mainStr = CT.mode==='in' ? fmtInchesOnly(res) : fmtInches(res);
  const subStr  = CT.mode==='in' ? fmtInches(res)     : fmtInchesOnly(res);
  if(!chain) {
    document.getElementById('c-top').textContent  = `${CT.storedStr} ${CT.op} ${bStr} =`;
    document.getElementById('c-main').textContent = mainStr;
    document.getElementById('c-sub').textContent  = subStr;
    CT.phase='R';
  }
  CT.storedVal=res; CT.storedStr=mainStr; cResetInput();
}

function cFtAdvance() { setFtField('in'); }

function cClear() {
  CT.phase='A'; CT.op=''; CT.storedVal=0;
  CT.storedStr = CT.mode==='ft' ? "0' 0\"" : '0"';
  cResetInput();
  document.getElementById('c-top').textContent  = '';
  document.getElementById('c-main').textContent = CT.storedStr;
  document.getElementById('c-sub').textContent  = '';
  document.querySelectorAll('#tab-const .key-op').forEach(b=>b.classList.remove('active-op'));
}

function cSign() {
  if(CT.mode==='ft') return;
  if(CT.whole.startsWith('-')) CT.whole=CT.whole.slice(1);
  else CT.whole=CT.whole?'-'+CT.whole:'-0';
  cRender();
}

// ─── SQ FT TAB ────────────────────────────────────────────────────────────────
const SQ = { field: 'lft', lft: '', lin: '', wft: '', win: '', rate: '' };

function setSqField(f) {
  SQ.field = f;
  ['lft','lin','wft','win','rate'].forEach(id =>
    document.getElementById('sq-'+id).classList.toggle('active-sq', id===f)
  );
}

function sqCalc() {
  const lenIn = (parseInt(SQ.lft||'0') * 12) + parseInt(SQ.lin||'0');
  const widIn = (parseInt(SQ.wft||'0') * 12) + parseInt(SQ.win||'0');
  return (lenIn * widIn) / 144;
}

function sqRender() {
  document.getElementById('sq-lft').textContent  = SQ.lft  || '0';
  document.getElementById('sq-lin').textContent  = SQ.lin  || '0';
  document.getElementById('sq-wft').textContent  = SQ.wft  || '0';
  document.getElementById('sq-win').textContent  = SQ.win  || '0';
  document.getElementById('sq-rate').textContent = SQ.rate || '0';
  const sqft = sqCalc();
  const lenStr = `${SQ.lft||'0'}' ${SQ.lin||'0'}"`;
  const widStr = `${SQ.wft||'0'}' ${SQ.win||'0'}"`;
  document.getElementById('sq-top').textContent  = sqft > 0 ? `${lenStr} × ${widStr}` : '';
  document.getElementById('sq-main').textContent = sqft > 0 ? sqft.toFixed(2) + ' sq ft' : '0 sq ft';
  const rate = parseFloat(SQ.rate || '0');
  if (sqft > 0 && rate > 0) {
    const cost = sqft * rate;
    const fmt = v => '$' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    document.getElementById('sq-sub').textContent = fmt(cost);
  } else {
    document.getElementById('sq-sub').textContent = '';
  }
}

function sqW(d) {
  if (d === "'") {
    const next = { lft:'lin', lin:'wft', wft:'win', win:'rate', rate:'rate' };
    setSqField(next[SQ.field]);
    return;
  }
  if (d === '.') {
    if (SQ.field !== 'rate') return;
    if (SQ.rate.includes('.')) return;
    SQ.rate += '.';
    sqRender();
    return;
  }
  const maxLen = SQ.field === 'rate' ? 10 : (SQ.field==='lin' || SQ.field==='win') ? 2 : 4;
  if (SQ[SQ.field].length >= maxLen) return;
  SQ[SQ.field] += d;
  sqRender();
}

function sqDel() {
  SQ[SQ.field] = SQ[SQ.field].slice(0,-1);
  sqRender();
}

function sqClear() {
  SQ.lft=''; SQ.lin=''; SQ.wft=''; SQ.win=''; SQ.rate='';
  setSqField('lft');
  sqRender();
}

// ─── LAYOUT TAB ───────────────────────────────────────────────────────────────
const LAY = {
  mode: 'divide', field: 'sft',
  sft: '', sin: '', nparts: '',
  bwh: '', bnu: '', bde: '',
  gwh: '', gnu: '', gde: '',
  price: '',
};

const LAY_ADV_DIVIDE = { sft:'sin', sin:'nparts', nparts:'sft' };
const LAY_ADV_BOARDS = { sft:'sin', sin:'bwh', bwh:'bnu', bnu:'bde', bde:'gwh', gwh:'gnu', gnu:'gde', gde:'price', price:'sft' };

const LAY_ALL_FIELDS = ['sft','sin','nparts','bwh','bnu','bde','gwh','gnu','gde','price'];

function setLayMode(m) {
  LAY.mode = m;
  document.getElementById('lay-mode-divide').classList.toggle('active-mode', m==='divide');
  document.getElementById('lay-mode-boards').classList.toggle('active-mode', m==='boards');
  document.getElementById('lay-divide-row').style.display    = m==='divide' ? 'flex' : 'none';
  document.getElementById('lay-boards-rows').style.display   = m==='boards' ? 'block' : 'none';
  setLayField(m === 'divide' ? 'sft' : 'sft');
  layRender();
}

function setLayField(f) {
  LAY.field = f;
  LAY_ALL_FIELDS.forEach(id => {
    const el = document.getElementById('lay-' + id);
    if (el) el.classList.toggle('active-lay', id === f);
  });
}

function layW(d) {
  const f = LAY.field;
  if (d === '.') {
    if (f !== 'price') return;
    if (LAY.price.includes('.')) return;
    LAY.price += '.';
    layRender();
    return;
  }
  const maxLen = f === 'sin' ? 2 : (f === 'bnu'||f==='bde'||f==='gnu'||f==='gde') ? 3 : f === 'sft' ? 4 : 10;
  if (LAY[f].length >= maxLen) return;
  LAY[f] += d;
  layRender();
}

function layAdv() {
  const map = LAY.mode === 'divide' ? LAY_ADV_DIVIDE : LAY_ADV_BOARDS;
  setLayField(map[LAY.field] || 'sft');
}

function layDel() {
  LAY[LAY.field] = LAY[LAY.field].slice(0, -1);
  layRender();
}

function layClear() {
  LAY_ALL_FIELDS.forEach(f => LAY[f] = '');
  setLayField('sft');
  layRender();
}

function layRender() {
  LAY_ALL_FIELDS.forEach(id => {
    const el = document.getElementById('lay-' + id);
    if (el) el.textContent = LAY[id] || '0';
  });

  const top  = document.getElementById('lay-top');
  const main = document.getElementById('lay-main');
  const sub  = document.getElementById('lay-sub');
  const spanIn = (parseInt(LAY.sft||'0') * 12) + parseInt(LAY.sin||'0');

  if (LAY.mode === 'divide') {
    const n = parseInt(LAY.nparts||'0');
    if (spanIn > 0 && n > 0) {
      const partIn = spanIn / n;
      top.textContent  = `${LAY.sft||'0'}' ${LAY.sin||'0'}" ÷ ${n}`;
      main.textContent = fmtInches(partIn);
      sub.textContent  = fmtInchesOnly(partIn) + ' each';
    } else {
      top.textContent  = '';
      main.textContent = '—';
      sub.textContent  = '';
    }
  } else {
    const bDe   = parseInt(LAY.bde||'0');
    const boardIn = parseInt(LAY.bwh||'0') + (bDe > 0 ? parseInt(LAY.bnu||'0') / bDe : 0);
    const gDe   = parseInt(LAY.gde||'0');
    const gapIn = parseInt(LAY.gwh||'0') + (gDe > 0 ? parseInt(LAY.gnu||'0') / gDe : 0);
    if (spanIn > 0 && boardIn > 0) {
      const n       = Math.floor((spanIn + gapIn) / (boardIn + gapIn));
      const usedIn  = n * boardIn + Math.max(0, n - 1) * gapIn;
      const remIn   = Math.max(0, spanIn - usedIn);
      const price   = parseFloat(LAY.price || '0');
      top.textContent  = `${LAY.sft||'0'}' ${LAY.sin||'0'}" span`;
      main.textContent = `${n} board${n !== 1 ? 's' : ''}`;
      if (price > 0 && n > 0) {
        const total = n * price;
        sub.textContent = '$' + total.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',') + ' total';
      } else {
        sub.textContent = remIn > 0.001 ? fmtInchesOnly(remIn) + ' rem.' : 'fits exactly';
      }
    } else {
      top.textContent  = '';
      main.textContent = '—';
      sub.textContent  = '';
    }
  }
}

// ─── Keyboard input ───────────────────────────────────────────────────────────
let fracKbField  = 'whole';
let constKbField = 'whole';

function getActiveTab() {
  if (document.getElementById('tab-frac').classList.contains('active'))   return 'frac';
  if (document.getElementById('tab-const').classList.contains('active'))  return 'const';
  if (document.getElementById('tab-sqft').classList.contains('active'))   return 'sqft';
  if (document.getElementById('tab-layout').classList.contains('active')) return 'layout';
}

document.addEventListener('keydown', e => {
  const tab = getActiveTab();
  if (!tab) return;
  const k = e.key;

  if (tab === 'frac') {
    if (k >= '0' && k <= '9') {
      if      (fracKbField === 'whole') fW(k);
      else if (fracKbField === 'num')   fN(k);
      else                              fD(k);
    } else if (k === '.')        { fW('.'); }
    else if (k === '/')          { fracKbField = fracKbField==='whole' ? 'num' : fracKbField==='num' ? 'den' : 'whole'; }
    else if (k === 'Backspace')  { if(fracKbField==='whole') fWdel(); else if(fracKbField==='num') fNdel(); else fDdel(); }
    else if (k==='Enter'||k==='=') { fEq(); fracKbField='whole'; }
    else if (k === 'Escape')     { fClear(); fracKbField='whole'; }
    else if (k === '+') fOp(document.querySelector('#tab-frac [data-op="+"]'));
    else if (k === '-') fOp(document.querySelector('#tab-frac [data-op="−"]'));
    else if (k === '*') fOp(document.querySelector('#tab-frac [data-op="×"]'));
    else return;
    e.preventDefault();
  }

  else if (tab === 'const') {
    if (k >= '0' && k <= '9') {
      if (CT.mode==='ft' || constKbField==='whole') cW(k);
      else if (constKbField==='num') cN(k);
      else cD(k);
    } else if (k === "'")       { cFtAdvance(); }
    else if (k === '/')         { if(CT.mode==='in') constKbField = constKbField==='whole' ? 'num' : constKbField==='num' ? 'den' : 'whole'; }
    else if (k === 'Backspace') { if(CT.mode==='ft'||constKbField==='whole') cWdel(); else if(constKbField==='num') cNdel(); else cDdel(); }
    else if (k==='Enter'||k==='=') { cEq(); constKbField='whole'; }
    else if (k === 'Escape')    { cClear(); constKbField='whole'; }
    else if (k === '+') cOp(document.querySelector('#tab-const [data-op="+"]'));
    else if (k === '-') cOp(document.querySelector('#tab-const [data-op="−"]'));
    else if (k === '*') cOp(document.querySelector('#tab-const [data-op="×"]'));
    else return;
    e.preventDefault();
  }

  else if (tab === 'sqft') {
    if (k >= '0' && k <= '9') sqW(k);
    else if (k === "'") sqW("'");
    else if (k === '.') sqW('.');
    else if (k === 'Backspace') sqDel();
    else if (k === 'Escape')    sqClear();
    else return;
    e.preventDefault();
  }

  else if (tab === 'layout') {
    if (k >= '0' && k <= '9') layW(k);
    else if (k === "'" || k === 'Tab') layAdv();
    else if (k === '.') layW('.');
    else if (k === 'Backspace') layDel();
    else if (k === 'Escape')    layClear();
    else return;
    e.preventDefault();
  }
});

// ─── SAVES ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadSaves() {
  try { return JSON.parse(localStorage.getItem('fc_saves') || '[]'); } catch { return []; }
}
function storeSaves(arr) {
  localStorage.setItem('fc_saves', JSON.stringify(arr));
  updateSavesBadge();
}
function loadProjects() {
  try { return JSON.parse(localStorage.getItem('fc_projects') || '[]'); } catch { return []; }
}
function storeProjects(arr) {
  localStorage.setItem('fc_projects', JSON.stringify(arr));
}

let savesFilter = 'all';

function updateSavesBadge() {
  const n = loadSaves().length;
  const btn   = document.getElementById('saves-tab-btn');
  const badge = document.getElementById('saves-badge');
  btn.classList.toggle('has-saves', n > 0);
  badge.textContent    = n > 0 ? n : '';
  badge.style.display  = n > 0 ? 'inline' : 'none';
}

function openSaves() {
  document.getElementById('saves-overlay').classList.remove('hidden');
  renderProjectPills();
  renderSavesList();
}
function closeSaves() {
  document.getElementById('saves-overlay').classList.add('hidden');
  document.getElementById('proj-picker').classList.add('hidden');
}

function renderProjectPills() {
  const projects = loadProjects();
  const row = document.getElementById('projects-row');
  const pills = [
    `<button class="proj-pill${savesFilter==='all'?' active':''}" onclick="setFilter('all')">ALL</button>`,
    ...projects.map(p =>
      `<button class="proj-pill${savesFilter===p.id?' active':''}" onclick="setFilter(${p.id})">${escHtml(p.name)}</button>`
    ),
    `<button class="proj-pill-new" onclick="newProject()">+ NEW</button>`
  ];
  row.innerHTML = pills.join('');
}

function setFilter(id) {
  if (savesFilter === id && id !== 'all') {
    const projects = loadProjects();
    const proj = projects.find(p => p.id === id);
    if (proj && confirm(`Delete project "${proj.name}"?\n\nSaved items will be kept but unassigned.`)) {
      storeProjects(projects.filter(p => p.id !== id));
      const saves = loadSaves();
      saves.forEach(s => { if (s.projectId === id) s.projectId = null; });
      storeSaves(saves);
      savesFilter = 'all';
      renderProjectPills();
      renderSavesList();
    }
    return;
  }
  savesFilter = id;
  renderProjectPills();
  renderSavesList();
}

function newProject(assignSaveId) {
  const name = prompt('Project name:');
  if (!name || !name.trim()) return;
  const projects = loadProjects();
  const proj = {id: Date.now(), name: name.trim()};
  projects.push(proj);
  storeProjects(projects);
  if (assignSaveId != null) {
    assignToProject(assignSaveId, proj.id);
  } else {
    renderProjectPills();
  }
}

let _pickerSaveId = null;
function openProjPicker(saveId, btn) {
  _pickerSaveId = saveId;
  const projects = loadProjects();
  const saves = loadSaves();
  const save = saves.find(s => s.id === saveId);
  const picker = document.getElementById('proj-picker');
  const items = [
    `<div class="proj-picker-item${!save?.projectId?' current':''}" onclick="assignToProject(${saveId},null)">No project</div>`,
    ...projects.map(p =>
      `<div class="proj-picker-item${save?.projectId===p.id?' current':''}" onclick="assignToProject(${saveId},${p.id})">${escHtml(p.name)}</div>`
    ),
    `<div class="proj-picker-item new-proj" onclick="newProject(${saveId})">+ New project</div>`
  ];
  picker.innerHTML = items.join('');
  const rect = btn.getBoundingClientRect();
  picker.style.top  = Math.min(rect.bottom + 4, window.innerHeight - 200) + 'px';
  picker.style.right = Math.max(window.innerWidth - rect.right, 4) + 'px';
  picker.style.left = 'auto';
  picker.classList.remove('hidden');
  setTimeout(() => document.addEventListener('click', _closePicker, {once:true, capture:true}), 10);
}
function _closePicker(e) {
  const picker = document.getElementById('proj-picker');
  if (!picker.contains(e.target)) {
    picker.classList.add('hidden');
  } else {
    setTimeout(() => document.addEventListener('click', _closePicker, {once:true, capture:true}), 10);
  }
}
function assignToProject(saveId, projectId) {
  const saves = loadSaves();
  const save = saves.find(s => s.id === saveId);
  if (save) save.projectId = projectId || null;
  storeSaves(saves);
  document.getElementById('proj-picker').classList.add('hidden');
  renderSavesList();
  renderProjectPills();
}

function saveCurrentResult() {
  const tab = getActiveTab();
  let entry = null;

  if (tab === 'frac') {
    const result = document.getElementById('f-main').textContent;
    if (!result || result === '0') return;
    entry = { badge:'FRAC',
      label:  document.getElementById('f-top').textContent || '',
      result, sub: '' };
  } else if (tab === 'const') {
    const result = document.getElementById('c-main').textContent;
    if (!result || result === '0"' || result === "0' 0\"") return;
    entry = { badge:'BUILD',
      label:  document.getElementById('c-top').textContent || '',
      result, sub: document.getElementById('c-sub').textContent || '' };
  } else if (tab === 'sqft') {
    const result = document.getElementById('sq-main').textContent;
    if (!result || result === '0 sq ft') return;
    entry = { badge:'SQ FT',
      label:  document.getElementById('sq-top').textContent || '',
      result, sub: document.getElementById('sq-sub').textContent || '' };
  } else if (tab === 'layout') {
    const result = document.getElementById('lay-main').textContent;
    if (!result || result === '—') return;
    entry = { badge: LAY.mode === 'divide' ? 'DIVIDE' : 'BOARDS',
      label:  document.getElementById('lay-top').textContent || '',
      result, sub: document.getElementById('lay-sub').textContent || '' };
  }

  if (!entry) return;
  entry.id = Date.now();
  const saves = loadSaves();
  saves.unshift(entry);
  storeSaves(saves);

  const btn = document.querySelector('.panel.active .disp-save-btn');
  if (btn) {
    btn.classList.add('saved');
    btn.textContent = 'SAVED';
    setTimeout(() => { btn.classList.remove('saved'); btn.textContent = 'SAVE'; }, 900);
  }
}

function deleteSave(id) {
  storeSaves(loadSaves().filter(s => s.id !== id));
  renderSavesList();
}

function clearAllSaves() {
  storeSaves([]);
  renderSavesList();
}

function renderSavesList() {
  let saves = loadSaves();
  const projects = loadProjects();
  const projMap = Object.fromEntries(projects.map(p => [p.id, p.name]));
  const list     = document.getElementById('saves-list');
  const clearBtn = document.getElementById('saves-clear-btn');

  if (savesFilter !== 'all') {
    saves = saves.filter(s => s.projectId === savesFilter);
  }

  clearBtn.style.display = saves.length > 0 ? 'inline-block' : 'none';
  if (saves.length === 0) {
    list.innerHTML = `<div class="saves-empty">${savesFilter !== 'all' ? 'No saves in this project' : 'Nothing saved yet'}</div>`;
    return;
  }
  list.innerHTML = saves.map(s => {
    const projName = s.projectId ? projMap[s.projectId] : null;
    return `
      <div class="save-card">
        <span class="save-badge">${s.badge}</span>
        <div class="save-body">
          ${s.label ? `<div class="save-label">${escHtml(s.label)}</div>` : ''}
          <div class="save-result">${escHtml(s.result)}</div>
          ${s.sub ? `<div class="save-sub">${escHtml(s.sub)}</div>` : ''}
          ${projName ? `<div class="save-proj-tag">&#128193; ${escHtml(projName)}</div>` : ''}
        </div>
        <div class="save-actions">
          <button class="save-assign-btn" onclick="openProjPicker(${s.id},this)">&#128193;</button>
          <button class="save-del-btn" onclick="deleteSave(${s.id})">&#x2715;</button>
        </div>
      </div>
    `;
  }).join('');
}

updateSavesBadge();
</script>
</body>
</html>
